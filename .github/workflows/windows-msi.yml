name: Windows MSI Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/windows-msi.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "crates/**"
      - "packaging/windows/**"
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-msi:
    name: Build x86_64 Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msi-x86_64-pc-windows-msvc

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Build MSI package
        shell: pwsh
        run: |
          .\packaging\windows\scripts\build-msi.ps1 `
            -Target x86_64-pc-windows-msvc `
            -Architecture x64 `
            -OutputDir target\windows-msi

      - name: Smoke test MSI install and uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $msiPath = Get-ChildItem target\windows-msi\*.msi | Select-Object -First 1 -ExpandProperty FullName
          if (-not $msiPath) {
            throw "Failed to locate generated MSI package"
          }

          $installDir = Join-Path ${env:ProgramFiles} "cnb-rs"
          $installedExe = Join-Path $installDir "cnb-rs.exe"
          $licenseFile = Join-Path $installDir "LICENSE"
          $readmeFile = Join-Path $installDir "README.md"
          $logDir = Join-Path $PWD "target\windows-msi\logs"
          $installLog = Join-Path $logDir "install.log"
          $uninstallLog = Join-Path $logDir "uninstall.log"
          $installed = $false
          $uninstalled = $false

          New-Item -ItemType Directory -Force -Path $logDir | Out-Null

          try {
            $install = Start-Process msiexec.exe -ArgumentList @(
              "/i", $msiPath, "/qn", "/norestart", "/L*V", $installLog
            ) -Wait -PassThru

            if ($install.ExitCode -ne 0) {
              throw "MSI install failed with exit code $($install.ExitCode)"
            }

            $installed = $true

            if (-not (Test-Path $installDir)) {
              throw "Install directory not found: $installDir"
            }

            foreach ($path in @($installedExe, $licenseFile, $readmeFile)) {
              if (-not (Test-Path $path)) {
                throw "Expected installed file not found: $path"
              }
            }

            $machinePathEntries = [Environment]::GetEnvironmentVariable("Path", "Machine") -split ';'
            if ($installDir -notin $machinePathEntries) {
              throw "Install directory was not appended to machine PATH"
            }

            & $installedExe --version

            $uninstall = Start-Process msiexec.exe -ArgumentList @(
              "/x", $msiPath, "/qn", "/norestart", "/L*V", $uninstallLog
            ) -Wait -PassThru

            if ($uninstall.ExitCode -ne 0) {
              throw "MSI uninstall failed with exit code $($uninstall.ExitCode)"
            }

            $uninstalled = $true

            if (Test-Path $installedExe) {
              throw "Installed executable still exists after uninstall: $installedExe"
            }

            $machinePathEntriesAfterUninstall = [Environment]::GetEnvironmentVariable("Path", "Machine") -split ';'
            if ($installDir -in $machinePathEntriesAfterUninstall) {
              throw "Install directory still present in machine PATH after uninstall"
            }
          }
          catch {
            if (Test-Path $installLog) {
              Write-Host "==== MSI install log ===="
              Get-Content $installLog
            }

            if (Test-Path $uninstallLog) {
              Write-Host "==== MSI uninstall log ===="
              Get-Content $uninstallLog
            }

            throw
          }
          finally {
            if ($installed -and -not $uninstalled) {
              $null = Start-Process msiexec.exe -ArgumentList @(
                "/x", $msiPath, "/qn", "/norestart"
              ) -Wait -PassThru -ErrorAction SilentlyContinue
            }
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cnb-rs-msi-x86_64-pc-windows-msvc
          path: target/windows-msi/*.msi
          if-no-files-found: error
          retention-days: 7
